<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Spotify + Partituras</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #121212;
      color: white;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 300px;
      background: #1e1e1e;
      padding: 10px;
      overflow-y: auto;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .song {
      padding: 10px;
      margin: 5px 0;
      background: #2a2a2a;
      cursor: pointer;
      border-radius: 6px;
    }

    .song:hover {
      background: #3a3a3a;
    }

    .player {
      margin-top: 20px;
    }

    audio {
      width: 100%;
    }

    .sheet {
      margin-top: 20px;
      background: #1e1e1e;
      padding: 10px;
      border-radius: 8px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>🎵 Canciones</h3>
  <div id="songList"></div>
</div>

<div class="main">
  <h2 id="title">Selecciona una canción</h2>

  <div class="player">
    <audio id="audio" controls></audio>
  </div>

  <div class="sheet">
    <h3>📄 Partitura</h3>
    <iframe id="sheetFrame"></iframe>
  </div>
</div>

<script>
const songs = [
  {
    name: "Canción 1",
    audio: "audio1.mp3",
    sheet: "sheet1.pdf"
  },
  {
    name: "Canción 2",
    audio: "audio2.mp3",
    sheet: "sheet2.pdf"
  }
];

let currentSong = null;

const songList = document.getElementById("songList");
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const sheetFrame = document.getElementById("sheetFrame");

function loadSongs() {
  songs.forEach((song, index) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.name;
    div.onclick = () => playSong(index);
    songList.appendChild(div);
  });
}

function playSong(index) {
  currentSong = songs[index];
  title.innerText = currentSong.name;
  audio.src = currentSong.audio;
  audio.play();

  // carga automática de partitura
  sheetFrame.src = currentSong.sheet;
}

loadSongs();
</script>

</body>
</html>
